# ==========================================
# Docker Compose - WhatsApp Clone
#
# Services:
#  - redis: Message broker + Socket.io adapter
#  - server: Node.js backend (scalable)
#  - client: React frontend (Nginx)
#  - nginx: Reverse proxy + Load balancer
# ==========================================

version: '3.8'

services:
  # ==========================================
  # Redis - Message broker & Socket.io adapter
  # ==========================================
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ==========================================
  # Backend Server (Node.js + Express + Socket.io)
  # Scale with: docker-compose up --scale server=3
  # ==========================================
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    env_file:
      - ./server/.env
    environment:
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ==========================================
  # Frontend Client (React + Vite → Nginx)
  # ==========================================
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    depends_on:
      - server
    restart: unless-stopped

  # ==========================================
  # Nginx - Reverse Proxy + Load Balancer
  # Handles:
  #  - Static file serving for client
  #  - WebSocket upgrade for Socket.io
  #  - Load balancing across server instances
  # ==========================================
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - server
      - client
    restart: unless-stopped

volumes:
  redis_data:
