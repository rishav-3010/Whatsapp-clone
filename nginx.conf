# ==========================================
# Nginx Reverse Proxy + Load Balancer
# 
# Key features:
# - IP hash for sticky sessions (required by Socket.io)
# - WebSocket upgrade handling (Connection: Upgrade)
# - Load balancing across multiple server instances
# - Static file serving for the React client
# ==========================================

events {
    worker_connections 4096;
}

http {
    # ==========================================
    # Upstream: Backend servers
    # ip_hash ensures the same client always
    # connects to the same server (sticky sessions)
    # This is REQUIRED for Socket.io to work with
    # HTTP long-polling fallback
    # ==========================================
    upstream backend {
        ip_hash;
        server server:3001;
        # When scaling: docker-compose up --scale server=3
        # Docker's DNS resolver will round-robin
    }

    # ==========================================
    # Upstream: Frontend client
    # ==========================================
    upstream frontend {
        server client:80;
    }

    server {
        listen 80;

        # ==========================================
        # API & Socket.io → Backend
        # ==========================================
        location /api/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ==========================================
        # Socket.io WebSocket connections
        # The Upgrade and Connection headers are CRITICAL
        # for the HTTP → WebSocket protocol upgrade
        # ==========================================
        location /socket.io/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            
            # WebSocket upgrade headers
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Timeouts for long-lived connections
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # ==========================================
        # Everything else → React Frontend
        # ==========================================
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
